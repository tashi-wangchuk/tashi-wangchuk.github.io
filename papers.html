      <!-- ================================================================
           HOW TO ADD A PAPER: copy one whole <div class="pub"> block,
           paste it ABOVE the others (newest first), and edit:
             pub-title   = the paper title (link it to the journal page)
             pub-authors = author list, your name in <strong>
             pub-venue   = journal, volume, article number
             pub-links   = [pdf] [journal] etc. — point the pdf link at
                           a file you put in files/
           ================================================================ -->

      <div class="pub">
        <span class="pub-title">
          <a href="https://doi.org/10.1088/1361-6501/ae0e9a">Non-invasive,
          non-contact conductivity measurement using radiofrequency probe
          loading</a>
        </span><br>
        <span class="pub-authors"><strong>Tashi Wangchuk</strong>, A. R. Aguilera, and Bruce J. Balcom</span><br>
        <span class="pub-venue">Measurement Science and Technology</span>
        <span class="pub-authors">36, 105107 (2025)</span><br>
        <span class="pub-links">[<a href="files/wangchuk-2025-conductivity.pdf">pdf</a>] [<a href="https://doi.org/10.1088/1361-6501/ae0e9a">journal</a>]</span>
      </div>

      <!-- Template for the next paper — copy, un-comment, and fill in:

        <span class="pub-venue">Journal Name</span>
        <span class="pub-authors">vol, pages (year)</span><br>
        <span class="pub-links">[<a href="files/FILENAME.pdf">pdf</a>]</span>
